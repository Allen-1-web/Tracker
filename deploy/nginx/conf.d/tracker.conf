# HTTP bootstrap — ptnway.ru (before SSL).
# After certbot: cp tracker.ssl.conf.example → tracker.ssl.conf, then rm this file.

server {
  listen 80;
  listen [::]:80;
  server_name ptnway.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /tg/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bot_upstream host.docker.internal;
    proxy_pass http://$bot_upstream:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    client_max_body_size 1m;
  }

  location / {
    proxy_pass http://tracker_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}
