# Active nginx site (HTTP bootstrap) — ptnway.ru
# For HTTPS after certbot: see tracker.ssl.conf.example and DEPLOY.md.

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream tracker_frontend {
  server frontend:3000;
  keepalive 32;
}

upstream tracker_bot_webhook {
  server bot-webhook:3001;
  keepalive 8;
}

server {
  listen 80;
  listen [::]:80;
  server_name ptnway.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /tg/ {
    proxy_pass http://tracker_bot_webhook;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    client_max_body_size 1m;
  }

  location / {
    proxy_pass http://tracker_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}
